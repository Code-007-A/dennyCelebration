<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroll Money + Italian Currency Earnings</title>

<style>
body {
    margin: 0;
    height: 400vh;
    background: radial-gradient(circle at center, #111, #000);
    overflow-x: hidden;
}

/* HAND */
.wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#hand {
    width: 160px;
    height: 160px;
    background: url("hand.png") center/contain no-repeat;
}

/* CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}

/* TEXT */
.text {
    position: fixed;
    bottom: 40px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
    opacity: 0.6;
}

/* 💰 EARNINGS */
#earnings {
    position: fixed;
    top: 160px;
    left: 20px;
    color: #00ff88;
    font-family: Arial;
    font-size: 22px;
    font-weight: bold;
}

/* 🔊 hint */
#hint {
    position: fixed;
    top: 10px;
    right: 20px;
    color: white;
    font-size: 12px;
    opacity: 0.7;
}

/* 🇮🇹 BANNER */
#banner {
    position: fixed;
    top: 0;
    width: 100%;
    height: 130px;
    background: linear-gradient(90deg,#009246,#fff,#ce2b37);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 48px;
    transform: translateY(-140px);
    transition: 0.7s;
}
</style>
</head>

<body>

<div id="hint">Click anywhere to enable sound 🔊</div>
<div id="earnings">Earnings: $0 | 🇮🇹 Italian Currency €0</div>

<canvas id="fx"></canvas>

<div id="banner">Happy Anniversary, Denny!</div>

<div class="wrap">
    <div id="hand"></div>
</div>

<div class="text">Scroll → earn money 💸 → bills stack + sound</div>

<audio id="cashSound" src="cash.mp3" preload="auto"></audio>

<script>
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");

const hand = document.getElementById("hand");
const banner = document.getElementById("banner");
const earningsEl = document.getElementById("earnings");
const sound = document.getElementById("cashSound");

let target = 0, current = 0, lastBurst = 0, triggered = false;
let earnings = 0, displayed = 0;

const usdToEur = 0.92;

const particles = [];
const stack = [];

/* 🔊 AUDIO FIX */
let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;

    sound.play().then(() => {
        sound.pause();
        sound.currentTime = 0;
        audioUnlocked = true;
        document.getElementById("hint").style.display = "none";
    }).catch(()=>{});
}

window.addEventListener("click", unlockAudio);
window.addEventListener("touchstart", unlockAudio);

function playCash() {
    if (!audioUnlocked) return;

    const s = sound.cloneNode();
    s.volume = 0.3;
    s.play().catch(()=>{});
}

/* RESIZE */
function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* MONEY */
function spawnMoney(x,y){
    for(let i=0;i<14;i++){
        particles.push({
            x,y,
            vx:(Math.random()-0.5)*8,
            vy:(Math.random()-0.8)*10,
            life:1,
            type:"bill"
        });
    }
}

/* COINS */
function spawnCoins(x,y){
    for(let i=0;i<45;i++){
        particles.push({
            x,y,
            vx:(Math.random()-0.5)*12,
            vy:(Math.random()-1.2)*14,
            life:1,
            type:"coin",
            rot:Math.random()*360
        });
    }
}

/* SCROLL */
addEventListener("scroll",()=>{
    const max = document.body.scrollHeight - innerHeight;
    target = scrollY / max;

    const now = performance.now();
    if(now - lastBurst > 90){
        spawnMoney(innerWidth/2, innerHeight/2);
        lastBurst = now;
    }

    if(target >= 0.98 && !triggered){
        spawnCoins(innerWidth/2, innerHeight/2);
        banner.style.transform = "translateY(0)";
        triggered = true;
    }

    if(target < 0.9){
        triggered = false;
        banner.style.transform = "translateY(-140px)";
    }
});

/* ANIMATE */
function animate(){
    requestAnimationFrame(animate);

    current += (target-current)*0.08;

    const squeeze = Math.abs(Math.sin(current*6*Math.PI));
    const rub = Math.sin(current*30);

    hand.style.transform =
        `translate(${rub*6}px,${-squeeze*4}px) rotate(${rub*8}deg) scale(${1-squeeze*0.08})`;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* STACK */
    stack.forEach(b=>{
        ctx.save();
        ctx.translate(b.x,b.y);
        ctx.rotate(b.rot);
        ctx.fillStyle="#00c853";
        ctx.fillRect(-20,-12,40,24);
        ctx.restore();
    });

    /* PARTICLES */
    for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];

        p.x+=p.vx;
        p.y+=p.vy;
        p.vy+=0.3;
        p.life-=0.02;

        ctx.save();
        ctx.globalAlpha=p.life;
        ctx.translate(p.x,p.y);

        if(p.type==="coin"){
            ctx.rotate((p.rot+=5)*Math.PI/180);
            ctx.fillStyle="#ffd700";
            ctx.beginPath();
            ctx.arc(0,0,6,0,Math.PI*2);
            ctx.fill();
        } else {

            if(p.y > canvas.height-40){
                stack.push({x:p.x,y:canvas.height-40,rot:(Math.random()-0.5)*0.4});
                earnings++;
                playCash();

                particles.splice(i,1);
                ctx.restore();
                continue;
            }

            ctx.fillStyle="#00c853";
            ctx.fillRect(-20,-12,40,24);
        }

        ctx.restore();

        if(p.life<=0) particles.splice(i,1);
    }

    /* 💰 UPDATE COUNTER */
    displayed += (earnings - displayed)*0.08;
    const eur = displayed * usdToEur;

    earningsEl.textContent =
        "Earnings: $" + Math.floor(displayed) +
        " | 🇮🇹 Italian Currency €" + Math.floor(eur);
}

animate();
</script>

</body>
</html>
