<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroll Money + Italian Currency Earnings</title>

<style>
body {
    margin: 0;
    height: 400vh;
    background: radial-gradient(circle at center, #111, #000);
    overflow-x: hidden;
}

/* HAND */
.wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    will-change: transform;
}

#hand {
    width: 160px;
    height: 160px;
    background-image: url("hand.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}

/* CANVAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}

/* TEXT */
.text {
    position: fixed;
    bottom: 40px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
    opacity: 0.6;
}

/* 💰 EARNINGS */
#earnings {
    position: fixed;
    top: 160px;
    left: 20px;
    color: #00ff88;
    font-family: Arial;
    font-size: 22px;
    font-weight: bold;
    z-index: 20;
    text-shadow: 0 0 10px rgba(0,255,136,0.4);
}

/* 🇮🇹 BANNER */
#banner {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 130px;

    background: linear-gradient(
        90deg,
        #009246 0%,
        #ffffff 35%,
        #ffffff 65%,
        #ce2b37 100%
    );

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 28px;
    font-family: Arial;
    font-weight: bold;
    color: #111;

    transform: translateY(-140px);
    transition: transform 0.7s ease;
    z-index: 10;
}

#banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="earnings">Earnings: $0 | 🇮🇹 Italian Currency €0</div>

<canvas id="fx"></canvas>

<div id="banner"><span>Happy Anniversary, Denny!</span></div>

<div class="wrap">
    <div id="hand"></div>
</div>

<div class="text">Scroll → earn money 💸 → bills stack + sound</div>

<!-- 🔊 SOUND -->
<audio id="cashSound" src="cash.mp3" preload="auto"></audio>

<script>
window.addEventListener("load", () => {

const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");

const hand = document.getElementById("hand");
const banner = document.getElementById("banner");
const earningsEl = document.getElementById("earnings");
const sound = document.getElementById("cashSound");

let target = 0;
let current = 0;
let lastBurst = 0;
let triggered = false;

let earnings = 0;
let displayedEarnings = 0;

const usdToEur = 0.92; // 🇮🇹 Italian currency conversion

const particles = [];
const stack = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🔊 sound */
function playCash() {
    const s = sound.cloneNode();
    s.volume = 0.3;
    s.play().catch(()=>{});
}

/* 💸 MONEY */
function spawnMoney(x, y) {
    for (let i = 0; i < 14; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.8) * 10,
            life: 1,
            type: "bill"
        });
    }
}

/* 💰 COINS */
function spawnCoins(x, y) {
    for (let i = 0; i < 45; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 1.2) * 14,
            life: 1,
            type: "coin",
            rot: Math.random() * 360
        });
    }
}

/* SCROLL */
window.addEventListener("scroll", () => {

    const max = document.documentElement.scrollHeight - window.innerHeight;
    target = window.pageYOffset / max;

    const now = performance.now();

    if (now - lastBurst > 90) {
        spawnMoney(window.innerWidth / 2, window.innerHeight / 2);
        lastBurst = now;
    }

    if (target >= 0.98 && !triggered) {
        spawnCoins(window.innerWidth / 2, window.innerHeight / 2);
        banner.style.transform = "translateY(0)";
        triggered = true;
    }

    if (target < 0.9) {
        triggered = false;
        banner.style.transform = "translateY(-140px)";
    }
});

/* ANIMATION */
function animate() {
    requestAnimationFrame(animate);

    current += (target - current) * 0.08;

    const squeeze = Math.pow(Math.abs(Math.sin(current * 6 * Math.PI)), 1.5);
    const rub = Math.sin(current * 30);

    hand.style.transform =
        "translate(" + (rub * 6) + "px," + (squeeze * -4) + "px) " +
        "rotate(" + (rub * 8) + "deg) " +
        "scale(" + (1 - squeeze * 0.08) + ")";

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    /* STACK */
    for (let b of stack) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.rot);

        ctx.fillStyle = "#00c853";
        ctx.fillRect(-20, -12, 40, 24);

        ctx.strokeStyle = "rgba(0,0,0,0.3)";
        ctx.strokeRect(-20, -12, 40, 24);

        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.fillRect(-10, -6, 20, 12);

        ctx.restore();
    }

    /* PARTICLES */
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.life -= 0.02;

        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.translate(p.x, p.y);

        if (p.type === "coin") {
            ctx.rotate((p.rot += 5) * Math.PI / 180);
            ctx.fillStyle = "#ffd700";
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, Math.PI * 2);
            ctx.fill();
        } else {

            if (p.y > canvas.height - 40) {

                stack.push({
                    x: p.x,
                    y: canvas.height - 40,
                    rot: (Math.random() - 0.5) * 0.4
                });

                earnings += 1;
                playCash();

                particles.splice(i, 1);
                ctx.restore();
                continue;
            }

            ctx.fillStyle = "#00c853";
            ctx.fillRect(-20, -12, 40, 24);

            ctx.strokeStyle = "rgba(0,0,0,0.3)";
            ctx.strokeRect(-20, -12, 40, 24);

            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.fillRect(-10, -6, 20, 12);
        }

        ctx.restore();

        if (p.life <= 0) particles.splice(i, 1);
    }

    /* 💰 UPDATE DISPLAY */
    displayedEarnings += (earnings - displayedEarnings) * 0.08;

    const eur = displayedEarnings * usdToEur;

    earningsEl.textContent =
        "Earnings: $" + displayedEarnings.toFixed(0) +
        " | 🇮🇹 Italian Currency €" + eur.toFixed(0);
}

animate();

});
</script>

</body>
</html>
