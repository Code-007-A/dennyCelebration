<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scroll Money FX Fixed</title>

<style>
body {
    margin: 0;
    height: 400vh;
    background: radial-gradient(circle at center, #111, #000);
    overflow-x: hidden;
}

.wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#hand {
    width: 160px;
    height: 160px;
    background: url("hand.png") center/contain no-repeat;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}

#earnings {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #00ff88;
    font-family: Arial;
    font-size: 22px;
    font-weight: bold;
}

.text {
    position: fixed;
    bottom: 40px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: Arial;
    opacity: 0.6;
}
</style>
</head>

<body>

<div id="earnings">Earnings: $0</div>

<canvas id="fx"></canvas>

<div class="wrap">
    <div id="hand"></div>
</div>

<div class="text">Scroll to generate money 💸</div>

<script>
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");
const earningsEl = document.getElementById("earnings");
const hand = document.getElementById("hand");

let target = 0;
let current = 0;
let earnings = 0;

const particles = [];

/* resize */
function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* 🔥 SCROLL */
addEventListener("scroll", () => {
    const max = document.body.scrollHeight - innerHeight;
    target = scrollY / max;

    /* ALWAYS spawn effects while scrolling */
    spawnMoney(innerWidth/2, innerHeight/2);

    /* rare coin burst */
    if (Math.random() < 0.2) {
        spawnCoins(innerWidth/2, innerHeight/2);
    }
});

/* 💸 MONEY */
function spawnMoney(x, y){
    for (let i = 0; i < 5; i++) {
        particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 1) * 8,
            life: 1,
            type: "bill"
        });
    }
}

/* 💰 COINS */
function spawnCoins(x, y){
    for (let i = 0; i < 8; i++) {
        particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 1.2) * 12,
            life: 1,
            type: "coin",
            rot: Math.random() * 360
        });
    }
}

/* ANIMATE */
function animate(){
    requestAnimationFrame(animate);

    current += (target - current) * 0.08;

    /* FIXED COUNTER */
    earnings = Math.floor(current * 2500);
    earningsEl.textContent = "Earnings: $" + earnings;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* PARTICLES */
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.25;
        p.life -= 0.015;

        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.translate(p.x, p.y);

        if (p.type === "coin") {
            ctx.rotate((p.rot += 6) * Math.PI / 180);
            ctx.fillStyle = "#ffd700";
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.fillStyle = "#00c853";
            ctx.fillRect(-20, -12, 40, 24);
        }

        ctx.restore();

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }

    /* hand animation */
    const move = Math.sin(current * 10) * 6;
    hand.style.transform = `translate(${move}px,${-move}px)`;
}

animate();
</script>

</body>
</html>
